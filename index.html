<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Ruqyah Healing · Dual Track | Protection & Peace</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b3d2e 0%, #1b6e50 70%, #2a9d8f 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 1rem;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.08"><path d="M20 20 L30 15 L40 20 L50 10 L60 20 L70 12 L80 20 L85 30 L80 40 L90 50 L80 60 L85 70 L80 80 L70 85 L60 80 L50 90 L40 80 L30 85 L20 80 L15 70 L20 60 L10 50 L20 40 L15 30 Z" fill="none" stroke="%23ffd966" stroke-width="1.5"/></svg>');
      background-size: 120px 120px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 620px;
      z-index: 10;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .player-card {
      background: rgba(10, 50, 35, 0.4);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 48px 48px 32px 32px;
      border: 1px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.2) inset;
      padding: 2rem 1.8rem;
      transition: all 0.3s;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #ffdf7e;
      text-shadow: 0 2px 10px rgba(255, 215, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 0.4rem;
    }

    h1 i {
      font-size: 2.2rem;
      color: #f5c542;
      filter: drop-shadow(0 0 6px gold);
    }

    .subhead {
      font-size: 1.15rem;
      opacity: 0.9;
      margin-bottom: 1.5rem;
      border-bottom: 1px dashed rgba(255, 215, 0, 0.5);
      padding-bottom: 0.7rem;
      display: inline-block;
    }

    /* track selector row */
    .track-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1.8rem;
    }
    .track-btn {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 215, 0, 0.6);
      border-radius: 60px;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffefc0;
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .track-btn i {
      font-size: 1.1rem;
      color: #ffd966;
    }
    .track-btn.active-track-btn {
      background: #ffd96633;
      border-color: gold;
      color: #fff6cf;
      box-shadow: 0 0 12px rgba(255,215,0,0.5);
    }
    .track-btn:hover {
      background: #ffd96622;
      transform: scale(1.02);
    }

    .bismillah {
      font-size: 1.9rem;
      font-family: 'Amiri', 'Traditional Arabic', 'Noto Naskh Arabic', serif;
      background: rgba(0, 0, 0, 0.25);
      padding: 0.8rem 0.5rem;
      border-radius: 60px;
      margin: 1rem 0 1.5rem 0;
      line-height: 1.4;
      color: #ffebaa;
      text-shadow: 0 0 8px #b8860b;
      border: 1px solid rgba(255, 210, 0, 0.3);
      box-shadow: 0 10px 15px -10px black;
    }

    .time-indicator {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      font-weight: 500;
      color: #ffe8b5;
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }

    #current-time, #duration-time {
      background: rgba(0, 0, 0, 0.4);
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      border: 1px solid #ffd96677;
      backdrop-filter: blur(4px);
    }

    #progress {
      width: 100%;
      height: 10px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.15);
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 5px #ffd96699, inset 0 1px 5px #00000055;
      margin-bottom: 1.8rem;
    }

    #progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: gold;
      border-radius: 50%;
      border: 2px solid #fff3c9;
      box-shadow: 0 0 12px #ffbf00, 0 2px 8px black;
      transition: 0.1s;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.6rem 0.8rem;
      margin: 1.2rem 0 2rem 0;
    }

    .ctrl-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.5);
      border-radius: 50px;
      padding: 0.8rem 1.5rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffecb3;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px -10px #000000cc, 0 0 0 1px #ffd96633 inset;
      transition: 0.2s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn i {
      font-size: 1.4rem;
      color: gold;
    }

    .ctrl-btn:hover {
      background: rgba(255, 215, 0, 0.25);
      transform: scale(1.02);
      border-color: #ffdb8a;
    }

    .volume-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 1rem 0 0.5rem 0;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #ffd96655;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .volume-box i {
      font-size: 1.4rem;
      color: #ffdb7c;
    }

    #volumeSlider {
      width: 140px;
      height: 6px;
      border-radius: 20px;
      background: rgba(255,255,240,0.25);
      -webkit-appearance: none;
    }

    #volumeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      background: gold;
      border-radius: 50%;
      border: 1px solid white;
    }

    #repeatBtn.active {
      background: #e5b80055;
      border-color: gold;
      color: #fff3b3;
      box-shadow: 0 0 15px gold;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 1rem;
      opacity: 0.9;
      color: #ffe49e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-top: 1px dashed #ffd96699;
      padding-top: 1.3rem;
    }

    .now-playing-label {
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 5px;
      opacity: 0.85;
    }
    #currentTrackLabel {
      font-weight: bold;
      text-align: center;
      font-size: 0.95rem;
      background: rgba(0,0,0,0.3);
      display: inline-block;
      width: auto;
      margin: 0 auto 12px auto;
      padding: 5px 15px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    @media (max-width: 460px) {
      .player-card { padding: 1.5rem 1rem; }
      h1 { font-size: 1.9rem; }
      .bismillah { font-size: 1.4rem; }
      .ctrl-btn { padding: 0.6rem 1.2rem; font-size: 1rem; }
      .track-btn { padding: 0.4rem 1rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="player-card">
    <h1>
      <i class="fas fa-moon"></i> Ruqyah Healing <i class="fas fa-star"></i>
    </h1>
    <div class="subhead">الرقية الشرعية · protection & inner peace</div>

    <!-- Dual Track Selection Buttons -->
    <div class="track-selector">
      <button id="trackProtectBtn" class="track-btn active-track-btn">
        <i class="fas fa-shield-alt"></i> Standard Ruqyah<br><span style="font-size:0.7rem;">Protection & Healing</span>
      </button>
      <button id="trackPeaceBtn" class="track-btn">
        <i class="fas fa-dove"></i> Peace & Relief<br><span style="font-size:0.7rem;">Depression · Anxiety · Loneliness</span>
      </button>
    </div>

    <div class="bismillah">بِسْمِ ٱللَّٰهِ الرَّحْمَـٰنِ الرَّحِيمِ</div>

    <!-- Now playing indicator -->
    <div class="now-playing-label"><i class="fas fa-headphones"></i> NOW PLAYING</div>
    <div id="currentTrackLabel" style="text-align:center; margin-bottom: 1rem;">🕌 Protection Ruqyah</div>

    <audio id="audio" preload="metadata"></audio>

    <div class="time-indicator">
      <span id="current-time">0:00</span>
      <span id="duration-time">0:00</span>
    </div>
    <input type="range" id="progress" value="0" min="0" max="100" step="0.1">

    <div class="controls">
      <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i> <span>Play</span></button>
      <button class="ctrl-btn" id="stopBtn"><i class="fas fa-stop"></i> Stop</button>
      <button class="ctrl-btn" id="repeatBtn"><i class="fas fa-repeat"></i> Repeat</button>
    </div>

    <div class="volume-box">
      <i class="fas fa-volume-high" id="volumeIcon"></i>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
    </div>

    <div style="font-size:0.85rem; margin-top:1rem; background:rgba(0,0,0,0.2); border-radius:50px; padding:0.3rem; text-align:center; color:#ffdb9f;">
      <i class="fas fa-info-circle"></i> Choose recitation above · repeat mode available
    </div>

    <footer>
      <i class="fas fa-heart" style="color: #ff9f6e;"></i> Developed by Vaseem Ahmad <i class="fas fa-hand-sparkles"></i>
    </footer>
  </div>
</div>

<script>
  (function() {
    // ----- TRACKS -----
    const TRACKS = {
      protection: {
        name: "🛡️ Protection & Healing Ruqyah",
        url: "audio/ruqyah_full.mp3"
      },
      peace: {
        name: "🌸 Peace & Relief (Depression / Anxiety / Loneliness)",
        url: "audio/Powerful Ruqyah FOR PEACE And Remove Depression Anxiety Loneliness.mp3"
      }
    };

    let currentTrackKey = "protection"; // 'protection' or 'peace'
    let isPlaying = false;
    let repeatActive = false;

    // DOM elements
    const audio = document.getElementById('audio');
    const progress = document.getElementById('progress');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeIcon = document.getElementById('volumeIcon');
    const currentTimeSpan = document.getElementById('current-time');
    const durationSpan = document.getElementById('duration-time');
    const currentTrackLabelSpan = document.getElementById('currentTrackLabel');
    const trackProtectBtn = document.getElementById('trackProtectBtn');
    const trackPeaceBtn = document.getElementById('trackPeaceBtn');

    // helper: format time mm:ss
    function formatTime(seconds) {
      if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // update play/pause button appearance
    function updatePlayPauseButton() {
      const icon = playPauseBtn.querySelector('i');
      const span = playPauseBtn.querySelector('span');
      if (isPlaying) {
        icon.className = 'fas fa-pause';
        span.textContent = 'Pause';
      } else {
        icon.className = 'fas fa-play';
        span.textContent = 'Play';
      }
    }

    // load current track based on selected key
    function loadCurrentTrack() {
      const track = TRACKS[currentTrackKey];
      if (!track) return;
      
      // store current playing state before changing src
      const wasPlaying = isPlaying;
      if (wasPlaying) {
        audio.pause();
      }
      
      audio.src = track.url;
      audio.load();
      
      // update label
      currentTrackLabelSpan.innerHTML = track.name;
      
      // after metadata loaded, update duration and reset progress
      audio.addEventListener('loadedmetadata', function onMeta() {
        durationSpan.textContent = formatTime(audio.duration);
        progress.max = 100;
        progress.value = 0;
        currentTimeSpan.textContent = '0:00';
        audio.removeEventListener('loadedmetadata', onMeta);
      });
      
      // if it was playing before switching, resume after load
      if (wasPlaying) {
        audio.play().then(() => {
          isPlaying = true;
          updatePlayPauseButton();
        }).catch(e => {
          console.warn("autoplay after track switch failed:", e);
          isPlaying = false;
          updatePlayPauseButton();
        });
      } else {
        isPlaying = false;
        updatePlayPauseButton();
      }
    }

    // switch track (called when user clicks on protection or peace button)
    function switchTrack(trackKey) {
      if (currentTrackKey === trackKey) return;
      currentTrackKey = trackKey;
      
      // update active button style
      if (trackKey === 'protection') {
        trackProtectBtn.classList.add('active-track-btn');
        trackPeaceBtn.classList.remove('active-track-btn');
      } else {
        trackPeaceBtn.classList.add('active-track-btn');
        trackProtectBtn.classList.remove('active-track-btn');
      }
      
      // reset repeat UI state (but keep repeatActive value? we keep as is)
      // load new track
      loadCurrentTrack();
      
      // if repeat was on, ensure it's applied to new track
      audio.loop = repeatActive;
    }

    // Play / Pause core
    function playAudio() {
      audio.play().then(() => {
        isPlaying = true;
        updatePlayPauseButton();
      }).catch(e => {
        console.warn('playback failed:', e);
        isPlaying = false;
        updatePlayPauseButton();
        // show gentle hint if file missing
        if (e.name === 'NotSupportedError' || audio.error) {
          alert(`⚠️ Audio file not found!\n\nMake sure "${TRACKS[currentTrackKey].url}" exists in the "audio/" folder.\n\nFor Peace track, please upload:\n"Powerful Ruqyah FOR PEACE And Remove Depression Anxiety Loneliness.mp3"`);
        }
      });
    }

    function pauseAudio() {
      audio.pause();
      isPlaying = false;
      updatePlayPauseButton();
    }

    function togglePlay() {
      if (isPlaying) {
        pauseAudio();
      } else {
        playAudio();
      }
    }

    function stopAudio() {
      audio.pause();
      audio.currentTime = 0;
      isPlaying = false;
      updatePlayPauseButton();
      // update progress display
      if (audio.duration) {
        progress.value = 0;
        currentTimeSpan.textContent = '0:00';
      }
    }

    // update progress bar & time labels
    function updateProgress() {
      if (audio.duration && !isNaN(audio.duration)) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.value = percent;
        currentTimeSpan.textContent = formatTime(audio.currentTime);
        durationSpan.textContent = formatTime(audio.duration);
      } else {
        currentTimeSpan.textContent = '0:00';
        durationSpan.textContent = '0:00';
      }
    }

    // seek
    function handleProgressInput(e) {
      if (audio.duration) {
        const newTime = (progress.value / 100) * audio.duration;
        audio.currentTime = newTime;
        currentTimeSpan.textContent = formatTime(newTime);
      }
    }

    // ended event: if repeat is active, loop manually (since loop attribute works, but we also keep UI)
    // Actually loop attribute handles continuous replay, but we also want to keep isPlaying true.
    // However, to avoid any issue we rely on audio.loop.
    function onEnded() {
      if (!repeatActive) {
        isPlaying = false;
        updatePlayPauseButton();
      } else {
        // loop is active, audio will restart automatically, isPlaying stays true
        // but ensure button state remains "pause"
        if (!isPlaying) {
          isPlaying = true;
          updatePlayPauseButton();
        }
      }
    }

    // volume
    function setupVolume() {
      const vol = parseFloat(volumeSlider.value);
      audio.volume = vol;
      if (vol >= 0.5) {
        volumeIcon.className = 'fas fa-volume-high';
      } else if (vol > 0) {
        volumeIcon.className = 'fas fa-volume-low';
      } else {
        volumeIcon.className = 'fas fa-volume-off';
      }
    }

    // Event listeners
    audio.addEventListener('loadedmetadata', () => {
      durationSpan.textContent = formatTime(audio.duration);
      progress.max = 100;
    });
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', onEnded);
    audio.addEventListener('play', () => {
      isPlaying = true;
      updatePlayPauseButton();
    });
    audio.addEventListener('pause', () => {
      if (!audio.ended) {
        isPlaying = false;
        updatePlayPauseButton();
      }
    });

    progress.addEventListener('input', handleProgressInput);

    volumeSlider.addEventListener('input', () => {
      const vol = parseFloat(volumeSlider.value);
      audio.volume = vol;
      if (vol >= 0.5) volumeIcon.className = 'fas fa-volume-high';
      else if (vol > 0) volumeIcon.className = 'fas fa-volume-low';
      else volumeIcon.className = 'fas fa-volume-off';
    });

    // repeat button logic
    repeatBtn.addEventListener('click', () => {
      repeatActive = !repeatActive;
      audio.loop = repeatActive;
      if (repeatActive) {
        repeatBtn.classList.add('active');
      } else {
        repeatBtn.classList.remove('active');
      }
    });

    // control buttons
    playPauseBtn.addEventListener('click', togglePlay);
    stopBtn.addEventListener('click', stopAudio);

    // track switching buttons
    trackProtectBtn.addEventListener('click', () => switchTrack('protection'));
    trackPeaceBtn.addEventListener('click', () => switchTrack('peace'));

    // initial setup
    audio.volume = volumeSlider.value;
    setupVolume();
    // set default track (protection)
    currentTrackKey = 'protection';
    trackProtectBtn.classList.add('active-track-btn');
    trackPeaceBtn.classList.remove('active-track-btn');
    loadCurrentTrack();

    // initial repeat UI (default off)
    repeatActive = false;
    audio.loop = false;
    repeatBtn.classList.remove('active');

    // error handler for missing files
    audio.addEventListener('error', (e) => {
      console.error("Audio error", audio.error);
      const trackName = TRACKS[currentTrackKey].name;
      let friendlyMsg = `⚠️ Could not load "${trackName}".\n\n`;
      if (currentTrackKey === 'protection') {
        friendlyMsg += `Please ensure "audio/ruqyah_full.mp3" exists.\n`;
      } else {
        friendlyMsg += `Please upload the file:\n"Powerful Ruqyah FOR PEACE And Remove Depression Anxiety Loneliness.mp3"\ninside the "audio/" folder.`;
      }
      if (!document.querySelector('.error-toast')) {
        const toast = document.createElement('div');
        toast.className = 'error-toast';
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '20px';
        toast.style.right = '20px';
        toast.style.background = '#c72a2add';
        toast.style.backdropFilter = 'blur(12px)';
        toast.style.padding = '12px';
        toast.style.borderRadius = '30px';
        toast.style.textAlign = 'center';
        toast.style.fontSize = '0.9rem';
        toast.style.zIndex = '999';
        toast.innerHTML = friendlyMsg + ' <button style="background:gold; border:none; border-radius:30px; padding:4px 12px; margin-left:10px;" onclick="this.parentElement.remove()">OK</button>';
        document.body.appendChild(toast);
        setTimeout(() => toast?.remove(), 8000);
      }
    });
  })();
</script>
</body>
</html>
