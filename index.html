<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Ruqyah Healing | Multi-Surah Player with Repeats</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a2f22 0%, #135c43 55%, #1e7a5c 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      padding: 1.5rem;
      position: relative;
    }

    /* decorative overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.06"><path fill="none" stroke="%23ffd966" stroke-width="1.2" d="M20 30 L35 18 L50 30 L65 18 L80 30 L75 48 L88 62 L72 74 L50 68 L28 74 L12 62 L25 48 Z"/><circle cx="50" cy="48" r="6" stroke="%23ffd966" fill="none"/></svg>');
      background-size: 110px 110px;
      pointer-events: none;
    }

    .app-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      z-index: 5;
    }

    /* main player card */
    .player-card {
      flex: 2;
      min-width: 320px;
      background: rgba(10, 45, 32, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(255, 215, 0, 0.35);
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 45px -20px black, 0 0 0 1px rgba(255, 200, 0, 0.2) inset;
      transition: all 0.2s;
    }

    .playlist-panel {
      flex: 1.4;
      min-width: 280px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 1.6rem 1rem;
      border: 1px solid #ffd96655;
      box-shadow: 0 20px 35px -15px black;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      color: #ffdf7e;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
      margin-bottom: 0.25rem;
    }

    h1 i {
      font-size: 2rem;
      color: #f5c542;
    }

    .sub {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.9;
      border-bottom: 1px dashed #ffd966aa;
      display: inline-block;
      width: auto;
      margin: 0 auto 1.5rem auto;
      padding-bottom: 0.5rem;
    }

    .bismillah {
      font-family: 'Amiri', 'Noto Naskh Arabic', serif;
      font-size: 1.8rem;
      background: rgba(0,0,0,0.3);
      padding: 0.8rem 0.5rem;
      border-radius: 60px;
      text-align: center;
      color: #ffefb9;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }

    .now-playing {
      background: rgba(255,215,0,0.15);
      border-radius: 60px;
      padding: 0.5rem 1rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .now-playing-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #currentTrackName {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffeaac;
    }

    #repeatStatus {
      font-size: 0.9rem;
      background: #00000066;
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 50px;
      margin-top: 6px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin: 0.7rem 0 0.3rem;
      color: #ffefc0;
    }

    #progress {
      width: 100%;
      height: 8px;
      border-radius: 20px;
      background: rgba(255,255,200,0.2);
      -webkit-appearance: none;
      cursor: pointer;
      margin-bottom: 1.2rem;
    }

    #progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: gold;
      border-radius: 50%;
      border: 2px solid #fff0b5;
      box-shadow: 0 0 8px gold;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 1.2rem 0;
    }

    .ctrl-btn {
      background: rgba(255,255,240,0.08);
      border: 1px solid #ffd966aa;
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff3cf;
      backdrop-filter: blur(5px);
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn i {
      font-size: 1.2rem;
      color: #ffd966;
    }

    .ctrl-btn:hover {
      background: #ffd96633;
      transform: scale(1.02);
      border-color: gold;
    }

    .volume-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0,0,0,0.3);
      width: fit-content;
      margin: 0 auto;
      padding: 5px 18px;
      border-radius: 60px;
    }

    #volumeSlider {
      width: 120px;
    }

    /* playlist styling */
    .playlist-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      padding-bottom: 8px;
      border-bottom: 2px solid #ffd96677;
    }

    .playlist-title {
      font-size: 1.4rem;
      font-weight: bold;
    }

    .reset-playlist {
      background: none;
      border: 1px solid #ffd966aa;
      padding: 5px 12px;
      border-radius: 40px;
      color: #ffecb3;
      cursor: pointer;
      font-size: 0.7rem;
    }

    .track-item {
      background: rgba(0,0,0,0.3);
      margin: 12px 0;
      padding: 10px 14px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      transition: all 0.2s;
      border-left: 4px solid transparent;
    }

    .track-item.active-track {
      background: #ffd96622;
      border-left: 4px solid gold;
      box-shadow: 0 0 10px rgba(255,215,0,0.3);
    }

    .track-info {
      display: flex;
      flex-direction: column;
      flex: 2;
    }

    .track-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .repeat-count-badge {
      font-size: 0.7rem;
      background: #00000066;
      padding: 2px 8px;
      border-radius: 50px;
    }

    .repeat-selector {
      background: #0f2f24;
      border: 1px solid #ffd966aa;
      border-radius: 30px;
      padding: 5px 8px;
      color: #ffeaac;
      font-weight: bold;
      cursor: pointer;
    }

    .skip-icon {
      background: transparent;
      border: none;
      color: #ffde9e;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 5px 8px;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      opacity: 0.8;
      border-top: 1px dashed #ffd96666;
      padding-top: 1rem;
    }

    @media (max-width: 780px) {
      .app-container { flex-direction: column; }
      .track-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- MAIN AUDIO PLAYER SECTION -->
  <div class="player-card">
    <h1><i class="fas fa-hand-sparkles"></i> Ruqyah Healing <i class="fas fa-quran"></i></h1>
    <div style="text-align:center"><span class="sub">الرقية الشرعية · protection & healing</span></div>
    <div class="bismillah">بِسْمِ ٱللَّٰهِ الرَّحْمَـٰنِ الرَّحِيمِ</div>

    <div class="now-playing">
      <div class="now-playing-label"><i class="fas fa-head-side-medical"></i> NOW PLAYING</div>
      <div id="currentTrackName">—</div>
      <div id="repeatStatus">Repeat 0/0</div>
    </div>

    <div class="time-row">
      <span id="current-time">0:00</span>
      <span id="duration-time">0:00</span>
    </div>
    <input type="range" id="progress" value="0" step="0.1">

    <div class="controls">
      <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i> Play</button>
      <button class="ctrl-btn" id="stopBtn"><i class="fas fa-stop"></i> Stop</button>
      <button class="ctrl-btn" id="prevTrackBtn"><i class="fas fa-backward-step"></i> Prev</button>
      <button class="ctrl-btn" id="nextTrackBtn"><i class="fas fa-forward-step"></i> Next</button>
    </div>

    <div class="volume-box">
      <i class="fas fa-volume-high" id="volumeIcon"></i>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
    </div>
    <footer><i class="fas fa-mosque"></i> Developed by Vaseem Ahmad · <i class="fas fa-repeat"></i> Repeats: 3/5/7 per Surah</footer>
  </div>

  <!-- PLAYLIST PANEL WITH REPEAT CONTROLS -->
  <div class="playlist-panel">
    <div class="playlist-header">
      <span class="playlist-title"><i class="fas fa-list-ul"></i> Ruqyah Surahs</span>
      <button id="resetPlaylistBtn" class="reset-playlist" title="Reset all repeats & start from first"><i class="fas fa-arrows-rotate"></i> Reset</button>
    </div>
    <div id="playlistContainer" style="max-height: 500px; overflow-y: auto; padding-right: 5px;"></div>
    <div style="margin-top: 15px; font-size: 12px; text-align:center; opacity:0.7;">
      <i class="fas fa-info-circle"></i> Each Surah repeats selected times → next Surah
    </div>
  </div>
</div>

<script>
  // ---------- TRACKS DEFINITION (all MP3 inside "audio/" folder) ----------
  const tracks = [
    { id: 0, name: "Surah Al-Fatiha",      file: "audio/fatiha.mp3",      repeatCount: 3, currentRepeatDone: 0 },
    { id: 1, name: "Ayat-ul-Kursi",        file: "audio/aayat_al_kursi.mp3", repeatCount: 3, currentRepeatDone: 0 },
    { id: 2, name: "Surah Al-Baqarah (Ruqyah)", file: "audio/baqrha.mp3", repeatCount: 3, currentRepeatDone: 0 },
    { id: 3, name: "Surah Al-Ikhlas",      file: "audio/ikhlas.mp3",      repeatCount: 3, currentRepeatDone: 0 },
    { id: 4, name: "Surah Al-Falaq",       file: "audio/falaq.mp3",       repeatCount: 3, currentRepeatDone: 0 },
    { id: 5, name: "Surah An-Naas",        file: "audio/naas.mp3",        repeatCount: 3, currentRepeatDone: 0 }
  ];

  // DOM elements
  const audio = new Audio();
  const progress = document.getElementById('progress');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const stopBtn = document.getElementById('stopBtn');
  const prevBtn = document.getElementById('prevTrackBtn');
  const nextBtn = document.getElementById('nextTrackBtn');
  const volumeSlider = document.getElementById('volumeSlider');
  const volumeIcon = document.getElementById('volumeIcon');
  const currentTimeSpan = document.getElementById('current-time');
  const durationSpan = document.getElementById('duration-time');
  const currentTrackNameSpan = document.getElementById('currentTrackName');
  const repeatStatusSpan = document.getElementById('repeatStatus');
  const playlistContainer = document.getElementById('playlistContainer');
  const resetPlaylistBtn = document.getElementById('resetPlaylistBtn');

  // player state
  let currentTrackIndex = 0;
  let isPlaying = false;
  let isSeeking = false;

  // helper: format time mm:ss
  function formatTime(seconds) {
    if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }

  // update UI for current track (name, repeat info)
  function updateTrackUI() {
    const track = tracks[currentTrackIndex];
    if (track) {
      currentTrackNameSpan.textContent = track.name;
      const remaining = track.repeatCount - track.currentRepeatDone;
      repeatStatusSpan.innerHTML = `<i class="fas fa-repeat"></i> Repeat ${track.currentRepeatDone + 1} / ${track.repeatCount} (${remaining} left)`;
    } else {
      currentTrackNameSpan.textContent = "—";
      repeatStatusSpan.textContent = "Completed";
    }
    renderPlaylist(); // refresh active highlight & repeat selectors
  }

  // load current track (reset audio src, preserve volume)
  function loadCurrentTrack() {
    const track = tracks[currentTrackIndex];
    if (!track) return;
    audio.src = track.file;
    audio.load();
    // update duration display when metadata loads
    audio.addEventListener('loadedmetadata', function onMeta() {
      durationSpan.textContent = formatTime(audio.duration);
      progress.max = 100;
      audio.removeEventListener('loadedmetadata', onMeta);
    });
    // if was playing, resume after load
    if (isPlaying) {
      audio.play().catch(e => console.warn("autoplay blocked?", e));
    }
    updateTrackUI();
  }

  // update progress bar & time
  function updateProgress() {
    if (!isSeeking && audio.duration && !isNaN(audio.duration)) {
      const percent = (audio.currentTime / audio.duration) * 100;
      progress.value = percent;
      currentTimeSpan.textContent = formatTime(audio.currentTime);
    }
  }

  // seek event
  progress.addEventListener('input', (e) => {
    if (audio.duration) {
      isSeeking = true;
      const newTime = (progress.value / 100) * audio.duration;
      audio.currentTime = newTime;
      currentTimeSpan.textContent = formatTime(newTime);
    }
  });
  progress.addEventListener('change', () => {
    isSeeking = false;
  });

  // handle track ending: increment repeat or move to next
  function handleTrackEnd() {
    const track = tracks[currentTrackIndex];
    if (!track) return;

    // increment repeat counter for this track
    track.currentRepeatDone++;

    if (track.currentRepeatDone < track.repeatCount) {
      // replay same track again
      audio.currentTime = 0;
      if (isPlaying) {
        audio.play().catch(e => console.warn);
      }
      updateTrackUI();
    } else {
      // repeats finished -> move to next track
      track.currentRepeatDone = 0;   // reset for future revisit
      const nextIndex = currentTrackIndex + 1;
      if (nextIndex < tracks.length) {
        // go to next track
        currentTrackIndex = nextIndex;
        loadCurrentTrack();
        if (isPlaying) {
          audio.play().catch(e => console.warn);
        }
        updateTrackUI();
      } else {
        // playlist completed
        isPlaying = false;
        updatePlayPauseButton();
        audio.pause();
        audio.currentTime = 0;
        currentTrackNameSpan.textContent = "✨ Completed ✨";
        repeatStatusSpan.textContent = "All Surahs finished";
        renderPlaylist();
      }
    }
  }

  audio.addEventListener('ended', handleTrackEnd);
  audio.addEventListener('timeupdate', updateProgress);
  audio.addEventListener('play', () => {
    isPlaying = true;
    updatePlayPauseButton();
  });
  audio.addEventListener('pause', () => {
    if (!audio.ended) isPlaying = false;
    updatePlayPauseButton();
  });

  function updatePlayPauseButton() {
    const icon = playPauseBtn.querySelector('i');
    const span = playPauseBtn.querySelector('span');
    if (isPlaying) {
      icon.className = 'fas fa-pause';
      span.textContent = 'Pause';
    } else {
      icon.className = 'fas fa-play';
      span.textContent = 'Play';
    }
  }

  function togglePlayPause() {
    if (isPlaying) {
      audio.pause();
    } else {
      // if no track loaded or ended? ensure track ready
      if (!audio.src || audio.ended) {
        // restart from current track index but reset repeats? better just reload current
        const track = tracks[currentTrackIndex];
        if (track) {
          loadCurrentTrack();
        }
      }
      audio.play().catch(e => {
        console.warn("play error", e);
        // might be missing file, show alert gentle
        alert("Audio file not found? Make sure MP3 files are in 'audio/' folder:\n fatiha.mp3, aayat_al_kursi.mp3, baqrha.mp3, ikhlas.mp3, falaq.mp3, naas.mp3");
      });
    }
  }

  function stopAudio() {
    audio.pause();
    audio.currentTime = 0;
    isPlaying = false;
    updatePlayPauseButton();
    updateProgress();
  }

  function nextTrack() {
    // finish current track repeats manually? user skip: move to next track
    const currentTrack = tracks[currentTrackIndex];
    if (currentTrack) {
      currentTrack.currentRepeatDone = currentTrack.repeatCount; // force finish
    }
    handleTrackEnd(); // this will advance
  }

  function prevTrack() {
    // go to previous track, reset its repeat progress to 0 so it plays from first repeat
    if (currentTrackIndex > 0) {
      // reset current track repeat count to 0 before leaving? optional, but we want fresh start on prev
      const oldTrack = tracks[currentTrackIndex];
      if (oldTrack) oldTrack.currentRepeatDone = 0;
      currentTrackIndex--;
      const newTrack = tracks[currentTrackIndex];
      if (newTrack) newTrack.currentRepeatDone = 0;
      loadCurrentTrack();
      if (isPlaying) {
        audio.play().catch(e => console.warn);
      }
      updateTrackUI();
    } else {
      // first track, just reset repeats and restart
      const firstTrack = tracks[0];
      if (firstTrack) {
        firstTrack.currentRepeatDone = 0;
        currentTrackIndex = 0;
        loadCurrentTrack();
        if (isPlaying) audio.play();
        updateTrackUI();
      }
    }
  }

  function resetPlaylist() {
    // reset all repeat progress to 0 and set index to 0, stop playback
    tracks.forEach(t => t.currentRepeatDone = 0);
    currentTrackIndex = 0;
    loadCurrentTrack();
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      updatePlayPauseButton();
    }
    audio.currentTime = 0;
    updateTrackUI();
    renderPlaylist();
  }

  // ----- RENDER PLAYLIST with repeat selectors (3,5,7) -----
  function renderPlaylist() {
    playlistContainer.innerHTML = '';
    tracks.forEach((track, idx) => {
      const div = document.createElement('div');
      div.className = 'track-item';
      if (idx === currentTrackIndex) div.classList.add('active-track');

      // left side info
      const infoDiv = document.createElement('div');
      infoDiv.className = 'track-info';
      infoDiv.innerHTML = `
        <div class="track-name">${track.name}</div>
        <div class="repeat-count-badge"><i class="fas fa-arrows-spin"></i> ${track.currentRepeatDone}/${track.repeatCount} done</div>
      `;

      // repeat selector (3,5,7)
      const select = document.createElement('select');
      select.className = 'repeat-selector';
      [3,5,7].forEach(opt => {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = `${opt} times`;
        if (track.repeatCount === opt) option.selected = true;
        select.appendChild(option);
      });
      select.addEventListener('change', (e) => {
        const newVal = parseInt(e.target.value);
        track.repeatCount = newVal;
        // IMPORTANT: if current repeat progress exceeds new limit, adjust currentRepeatDone to not exceed newCount
        if (track.currentRepeatDone >= newVal) {
          track.currentRepeatDone = newVal - 1;
          if (track.currentRepeatDone < 0) track.currentRepeatDone = 0;
        }
        // if currently playing this track, update UI
        if (idx === currentTrackIndex) {
          updateTrackUI();
        }
        renderPlaylist(); // re-render to update badge
      });

      // manual skip buttons for each track
      const skipBtn = document.createElement('button');
      skipBtn.className = 'skip-icon';
      skipBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
      skipBtn.title = 'Play this Surah from start (reset repeats)';
      skipBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        // reset repeat progress for this track to 0
        track.currentRepeatDone = 0;
        currentTrackIndex = idx;
        loadCurrentTrack();
        if (isPlaying) audio.play();
        updateTrackUI();
        renderPlaylist();
      });

      div.appendChild(infoDiv);
      div.appendChild(select);
      div.appendChild(skipBtn);
      playlistContainer.appendChild(div);
    });
  }

  // volume handling
  volumeSlider.addEventListener('input', (e) => {
    const vol = parseFloat(e.target.value);
    audio.volume = vol;
    if (vol >= 0.6) volumeIcon.className = 'fas fa-volume-high';
    else if (vol > 0) volumeIcon.className = 'fas fa-volume-low';
    else volumeIcon.className = 'fas fa-volume-off';
  });
  audio.volume = volumeSlider.value;
  volumeSlider.dispatchEvent(new Event('input'));

  // event listeners
  playPauseBtn.addEventListener('click', togglePlayPause);
  stopBtn.addEventListener('click', stopAudio);
  nextBtn.addEventListener('click', nextTrack);
  prevBtn.addEventListener('click', prevTrack);
  resetPlaylistBtn.addEventListener('click', resetPlaylist);

  // initial load
  loadCurrentTrack();
  renderPlaylist();
  updateTrackUI();

  // Error handling for missing files
  audio.addEventListener('error', (e) => {
    console.error("Audio load error", audio.error);
    const msg = "⚠️ Could not load: " + (tracks[currentTrackIndex]?.file || "audio file") + "\nPlease ensure MP3 files are in 'audio/' folder with exact names:\nfatiha.mp3, aayat_al_kursi.mp3, baqrha.mp3, ikhlas.mp3, falaq.mp3, naas.mp3";
    if (!document.querySelector('.error-toast')) {
      const toast = document.createElement('div');
      toast.className = 'error-toast';
      toast.style.position = 'fixed';
      toast.style.bottom = '20px';
      toast.style.left = '20px';
      toast.style.right = '20px';
      toast.style.background = '#c72a2add';
      toast.style.backdropFilter = 'blur(12px)';
      toast.style.padding = '12px';
      toast.style.borderRadius = '30px';
      toast.style.textAlign = 'center';
      toast.style.fontSize = '0.9rem';
      toast.style.zIndex = '999';
      toast.innerHTML = msg + ' <button style="background:gold; border:none; border-radius:30px; padding:4px 12px; margin-left:10px;" onclick="this.parentElement.remove()">OK</button>';
      document.body.appendChild(toast);
      setTimeout(() => toast?.remove(), 8000);
    }
  });
</script>
</body>
</html>
